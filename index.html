<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Dekuroma Samarinda by Rama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; background-attachment: fixed; font-family: 'Plus Jakarta Sans', sans-serif; color: #f1f5f9; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card-animate { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #mobileMenu, #cartSidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #mobileMenu { transform: translateX(100%); }
        #mobileMenu.active { transform: translateX(0); }
        #cartSidebar { transform: translateX(100%); }
        #cartSidebar.active { transform: translateX(0); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .swipe-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 85vh; width: 100%; }
        .swipe-item { flex: 0 0 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .swipe-item img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .glow-input:focus { box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); border-color: #22d3ee; }
    </style>
</head>
<body class="pb-10">

    <nav class="glass-nav sticky top-0 z-[100] py-4 px-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex flex-col" onclick="location.reload()" style="cursor:pointer">
                <h1 class="text-xl font-extrabold tracking-tighter text-white">DEKORUMA<span class="text-cyan-400">SAMARINDA</span></h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">by Rama</p>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="toggleCart()" class="relative p-2.5 bg-slate-800 rounded-xl border border-slate-700 active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-cyan-500 text-slate-900 text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-lg hidden">0</span>
                </button>

                <button onclick="toggleMenu()" class="p-2.5 bg-slate-800 rounded-xl border border-slate-700 active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="search-area sticky top-[72px] z-[90] py-4 px-6 mb-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-3">
            <input type="text" id="mainSearch" placeholder="Cari apa saja... (Sofa, Meja, SKU)" class="flex-grow pl-6 pr-6 py-4 rounded-2xl bg-slate-900/60 border border-slate-700/50 text-white font-medium glow-input outline-none backdrop-blur-md">
            <select id="priceSort" class="px-4 py-4 rounded-2xl bg-slate-900/60 border border-slate-700/50 text-white text-sm focus:outline-none backdrop-blur-md cursor-pointer md:w-44">
                <option value="DEFAULT">Urutkan: Terbaru</option>
                <option value="LOW">Harga: Terendah</option>
                <option value="HIGH">Harga: Tertinggi</option>
            </select>
            <select id="categoryFilter" class="hidden"></select>
        </div>
    </div>

    <div id="mobileMenu" class="fixed inset-y-0 right-0 w-[85%] bg-slate-950 z-[200] p-8 border-l border-slate-800 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-lg font-bold text-cyan-400">Kategori</h2>
            <button onclick="toggleMenu()"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        </div>
        <div id="categoryListMobile" class="flex flex-col gap-2 overflow-y-auto max-h-[80vh] hide-scrollbar"></div>
    </div>

    <div id="cartSidebar" class="fixed inset-y-0 right-0 w-[85%] max-w-md bg-slate-950 z-[200] p-8 border-l border-slate-800 shadow-2xl flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-lg font-bold text-white">Keranjang <span class="text-cyan-400">Saya</span></h2>
            <button onclick="toggleCart()"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        </div>
        <div id="cartItemsList" class="flex-grow overflow-y-auto space-y-4 pr-2 hide-scrollbar">
            <p class="text-slate-500 text-center py-10">Keranjang masih kosong...</p>
        </div>
        <div class="mt-6 pt-6 border-t border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <span class="text-slate-400">Estimasi Total</span>
                <span id="cartTotalText" class="text-xl font-black text-white">Rp 0</span>
            </div>
            <button onclick="checkoutWA()" class="w-full py-4 bg-cyan-500 text-slate-950 font-black rounded-2xl shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">CHECKOUT VIA WA</button>
        </div>
    </div>

    <div id="galleryModal" class="fixed inset-0 z-[300] bg-black/95 hidden flex-col justify-center items-center">
        <button onclick="closeGallery()" class="absolute top-6 right-6 p-3 bg-white/10 rounded-full text-white z-[310]"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        <div id="swipeContainer" class="swipe-container"></div>
        <p class="text-slate-500 text-[10px] my-4 uppercase tracking-widest font-bold font-sans">Swipe untuk detail</p>
    </div>

    <main class="max-w-7xl mx-auto px-6">
        <div id="loadingState" class="flex flex-col items-center justify-center py-20"><div class="w-10 h-10 border-4 border-cyan-500/20 border-t-cyan-400 rounded-full animate-spin mb-4"></div><p class="text-slate-500 text-[10px] tracking-widest font-bold uppercase">Syncing Database...</p></div>
        <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 hidden"></div>
        <div id="paginationContainer" class="flex justify-center mt-12 mb-20 hidden"><button onclick="loadMore()" class="px-10 py-4 bg-cyan-500 text-slate-950 font-black rounded-2xl hover:bg-white transition-all active:scale-95 shadow-lg">MUAT LEBIH BANYAK</button></div>
        <div id="emptyState" class="hidden text-center py-32"><p class="text-xl font-bold text-slate-300">Produk tidak ditemukan.</p></div>
    </main>

    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
    <script>
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
    </script>
</body>
</html>
